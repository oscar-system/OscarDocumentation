name: Cleanup Doc Preview

on:
  schedule:
      # Every Sunday at 5:05 AM UTC
      - cron: '5 5 * * 0'
  workflow_dispatch:

jobs:
  cleanup-doc-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: gh-pages
      - name: Delete previews
        run: |
          git config user.name "Documenter.jl[bot]"
          git config user.email "documenter@juliadocs.github.io"

          for folder in previews/*; do
            prnum=$(echo $folder | cut -c 12-)
            state=$(gh api repos/oscar-system/Oscar.jl/pulls/$prnum --jq '.state')
            echo "PR $prnum is $state"
            if [ "$state" != "open" ]; then
              echo "-> Deleting preview folder for PR $prnum"
              git rm -rf $folder 2>&1 > /dev/null || : # ignore errors
              git commit -m "delete preview for $PRNUM"
            fi
            git push
          done
        env:
          GH_TOKEN: ${{ github.token }}
